name: Search_All_Type
on:
  workflow_dispatch:
jobs:
  search-api-test:
    runs-on: [self-hosted, macOS, preprod]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -e
          python3 -m pip install --upgrade pip
          python3 -m pip install requests pytest pytest-html

      - name: Run Search API tests
        run: |
          set -e
          mkdir -p reports/evidence
          python3 -m pytest Search_All_Type/Verify_search_711.py Search_All_Type/test_search_api_common.py \
            --junitxml=reports/junit.xml \
            --html=reports/report.html \
            --self-contained-html \
            -v

      - name: Import JUnit to Xray (existing execution DMPREC-15999)
        if: always()
        env:
          XRAY_CLIENT_ID: ${{ secrets.XRAY_CLIENT_ID }}
          XRAY_CLIENT_SECRET: ${{ secrets.XRAY_CLIENT_SECRET }}
          XRAY_PROJECT_KEY: ${{ secrets.XRAY_PROJECT_KEY }}
          XRAY_TEST_EXEC_KEY: DMPREC-15999
        run: |
          set -euo pipefail
          if [ ! -f reports/junit.xml ]; then
            echo "ERROR: reports/junit.xml not found"
            exit 1
          fi
          echo "=== junit.xml preview (first 30 lines) ==="
          head -30 reports/junit.xml
          if [ -z "${XRAY_CLIENT_ID:-}" ] || [ -z "${XRAY_CLIENT_SECRET:-}" ] || [ -z "${XRAY_PROJECT_KEY:-}" ]; then
            echo "ERROR: Missing required XRAY secrets"
            exit 1
          fi
          XRAY_PROJECT_KEY="$(echo "$XRAY_PROJECT_KEY" | tr -d '\r\n' | xargs)"
          echo "Project key  : $XRAY_PROJECT_KEY"
          echo "Test exec key: $XRAY_TEST_EXEC_KEY"
          echo "Authenticating with Xray..."
          TOKEN=$(curl -sS \
            -H "Content-Type: application/json" \
            -X POST https://xray.cloud.getxray.app/api/v2/authenticate \
            -d "{\"client_id\":\"$XRAY_CLIENT_ID\",\"client_secret\":\"$XRAY_CLIENT_SECRET\"}" \
            | tr -d '"')
          if [ -z "$TOKEN" ]; then
            echo "ERROR: Xray authentication failed"
            exit 1
          fi
          echo "Authentication successful"
          URL="https://xray.cloud.getxray.app/api/v2/import/execution/junit?projectKey=$XRAY_PROJECT_KEY&testExecKey=$XRAY_TEST_EXEC_KEY"
          echo "Import URL: $URL"
          HTTP_STATUS=$(curl -sS \
            -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: text/xml" \
            --data-binary @reports/junit.xml \
            "$URL" \
            -o reports/xray_import_response.json)
          echo "HTTP Status : $HTTP_STATUS"
          cat reports/xray_import_response.json
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: Xray import failed with HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Import successful"

      - name: Attach evidence bundle to Jira issue
        if: always()
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          XRAY_TEST_EXEC_KEY: DMPREC-15999
        run: |
          python3 Search_All_Type/attach_evidence.py

      - name: Upload reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: search-api-reports
          path: reports
          if-no-files-found: warn
