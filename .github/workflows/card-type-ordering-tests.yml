name: Card Type Ordering Tests (p-sx Similar Privilege)

on:
  workflow_dispatch:

jobs:
  card-type-ordering-test:
    runs-on: [self-hosted, macOS, preprod]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          set -e
          python3 -m pip install --upgrade pip
          python3 -m pip install requests pytest pytest-html

      - name: Run Card Type Ordering tests
        run: |
          set -e
          mkdir -p reports card_type_reports
          python3 -m pytest test_card_type_ordering.py \
            --junitxml=reports/junit.xml \
            --html=reports/card_type_ordering_report.html \
            --self-contained-html \
            -v 2>&1 | tee reports/pytest_output.log || true

      - name: Zip evidence (CSV reports + HTML + log)
        if: always()
        run: |
          set -e
          mkdir -p reports/evidence
          # copy CSV evidence from card_type_reports/ into reports/
          if [ -d card_type_reports ] && [ "$(ls -A card_type_reports)" ]; then
            cp -r card_type_reports reports/evidence/
            echo "Copied $(ls card_type_reports | wc -l) CSV files"
          else
            echo "WARN: card_type_reports/ is empty or not found"
          fi
          cd reports
          zip -r evidence.zip . -x evidence.zip || true

      - name: Import JUnit to Xray
        if: always()
        env:
          XRAY_CLIENT_ID: ${{ secrets.XRAY_CLIENT_ID }}
          XRAY_CLIENT_SECRET: ${{ secrets.XRAY_CLIENT_SECRET }}
          XRAY_PROJECT_KEY: ${{ secrets.XRAY_PROJECT_KEY }}
          XRAY_TEST_PLAN_KEY: ${{ secrets.XRAY_TEST_PLAN_KEY }}
        run: |
          set -euo pipefail
          if [ ! -f reports/junit.xml ]; then
            echo "ERROR: reports/junit.xml not found"
            exit 1
          fi
          echo "=== junit.xml preview (first 30 lines) ==="
          head -30 reports/junit.xml
          if [ -z "${XRAY_CLIENT_ID:-}" ] || [ -z "${XRAY_CLIENT_SECRET:-}" ] || [ -z "${XRAY_PROJECT_KEY:-}" ]; then
            echo "ERROR: Missing required XRAY secrets"
            exit 1
          fi
          XRAY_PROJECT_KEY="$(echo "$XRAY_PROJECT_KEY" | tr -d '\r\n' | xargs)"
          XRAY_TEST_PLAN_KEY="$(echo "${XRAY_TEST_PLAN_KEY:-}" | tr -d '\r\n' | xargs)"
          echo "Project key : $XRAY_PROJECT_KEY"
          echo "Test plan   : ${XRAY_TEST_PLAN_KEY:-(not set)}"
          echo "Authenticating with Xray..."
          TOKEN=$(curl -sS \
            -H "Content-Type: application/json" \
            -X POST https://xray.cloud.getxray.app/api/v2/authenticate \
            -d "{\"client_id\":\"$XRAY_CLIENT_ID\",\"client_secret\":\"$XRAY_CLIENT_SECRET\"}" \
            | tr -d '"')
          if [ -z "$TOKEN" ]; then
            echo "ERROR: Xray authentication failed"
            exit 1
          fi
          echo "Authentication successful"
          URL="https://xray.cloud.getxray.app/api/v2/import/execution/junit?projectKey=$XRAY_PROJECT_KEY"
          if [ -n "$XRAY_TEST_PLAN_KEY" ]; then
            URL="${URL}&testPlanKey=$XRAY_TEST_PLAN_KEY"
          fi
          echo "Import URL: $URL"
          HTTP_STATUS=$(curl -sS \
            -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: text/xml" \
            --data-binary @reports/junit.xml \
            "$URL" \
            -o reports/xray_import_response.json)
          echo "HTTP Status : $HTTP_STATUS"
          cat reports/xray_import_response.json
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: Xray import failed with HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Import successful"

      - name: Attach evidence to Jira Test Execution
        if: always()
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          set -euo pipefail
          JIRA_BASE_URL="$(echo "${JIRA_BASE_URL:-}" | tr -d '\r\n' | xargs)"
          JIRA_BASE_URL="${JIRA_BASE_URL%/}"
          if [ -z "$JIRA_BASE_URL" ]; then
            echo "ERROR: JIRA_BASE_URL is empty"
            exit 1
          fi
          if [ ! -f "reports/xray_import_response.json" ]; then
            echo "WARN: xray_import_response.json not found — skipping attachment"
            exit 0
          fi
          if [ ! -s "reports/xray_import_response.json" ]; then
            echo "WARN: xray_import_response.json is empty (Xray import likely failed) — skipping attachment"
            exit 0
          fi
          echo "=== xray_import_response.json ==="
          cat reports/xray_import_response.json
          TEST_EXEC_KEY="$(python3 -c "import json; print(json.load(open('reports/xray_import_response.json','r',encoding='utf-8')).get('key',''))" | tr -d '\r\n' | xargs)"
          if [ -z "$TEST_EXEC_KEY" ]; then
            echo "ERROR: Cannot find Test Execution KEY"
            cat reports/xray_import_response.json || true
            exit 1
          fi
          echo "Test Execution key: $TEST_EXEC_KEY"
          ATTACH_URL="$JIRA_BASE_URL/rest/api/3/issue/$TEST_EXEC_KEY/attachments"

          # Attach fixed reports
          for f in \
            reports/card_type_ordering_report.html \
            reports/pytest_output.log \
            reports/evidence.zip \
            reports/junit.xml
          do
            if [ -f "$f" ]; then
              echo "Uploading $f ..."
              curl -sS --fail-with-body \
                -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
                -H "X-Atlassian-Token: no-check" \
                -F "file=@$f" \
                "$ATTACH_URL" >/dev/null
            else
              echo "WARN: missing file $f"
            fi
          done

          # Attach CSV evidence files (one per test case)
          if [ -d reports/evidence/card_type_reports ]; then
            for csv_file in reports/evidence/card_type_reports/*.csv; do
              if [ -f "$csv_file" ]; then
                echo "Uploading CSV evidence: $csv_file ..."
                curl -sS --fail-with-body \
                  -u "$JIRA_EMAIL:$JIRA_API_TOKEN" \
                  -H "X-Atlassian-Token: no-check" \
                  -F "file=@$csv_file" \
                  "$ATTACH_URL" >/dev/null
              fi
            done
            echo "All CSV evidence uploaded"
          else
            echo "WARN: No CSV evidence directory found"
          fi

          echo "DONE attach files to $TEST_EXEC_KEY"

      - name: Upload reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: card-type-ordering-reports
          path: reports
          if-no-files-found: warn
