name: fix bug duplicate
on:
  workflow_dispatch:
jobs:
  search-api-test:
    runs-on: [self-hosted, macOS, preprod]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        run: |
          python3 --version
          python3 -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          set -e
          python3 -m pip install requests pytest

      - name: Show workspace
        run: |
          pwd
          ls -la
          mkdir -p reports

      # ──────────────────────────────────────────────────────────────
      # Run each file separately → own junit XML (avoid pytest_generate_tests conflict)
      # ──────────────────────────────────────────────────────────────
      - name: Run tests/check_pp2vspp5.py
        run: |
          set -e
          python3 -m pytest tests/check_pp2vspp5.py \
            --junitxml=reports/junit_pp2vspp5.xml \
            -v -s

      - name: Run tests/check_pp2vspp5_changeid.py
        run: |
          set -e
          python3 -m pytest tests/check_pp2vspp5_changeid.py \
            --junitxml=reports/junit_pp2vspp5_changeid.xml \
            -v -s

      - name: Run tests/check_pp2vspp5_changeid_run.py
        run: |
          set -e
          python3 -m pytest tests/check_pp2vspp5_changeid_run.py \
            --junitxml=reports/junit_pp2vspp5_changeid_run.xml \
            -v -s

      # ──────────────────────────────────────────────────────────────
      # Import each XML to Xray separately → smaller payload, no timeout
      # ──────────────────────────────────────────────────────────────
      - name: Import JUnit to Xray
        if: always()
        env:
          XRAY_CLIENT_ID: ${{ secrets.XRAY_CLIENT_ID }}
          XRAY_CLIENT_SECRET: ${{ secrets.XRAY_CLIENT_SECRET }}
          XRAY_PROJECT_KEY: ${{ secrets.XRAY_PROJECT_KEY }}
          XRAY_TEST_PLAN_KEY: ${{ secrets.XRAY_TEST_PLAN_KEY }}
        run: |
          set -euo pipefail

          # ── Validate secrets ──────────────────────────────────────
          if [ -z "${XRAY_CLIENT_ID:-}" ] || [ -z "${XRAY_CLIENT_SECRET:-}" ] || [ -z "${XRAY_PROJECT_KEY:-}" ]; then
            echo "ERROR: Missing required XRAY secrets"
            exit 1
          fi

          XRAY_PROJECT_KEY="$(echo "$XRAY_PROJECT_KEY"   | tr -d '\r\n' | xargs)"
          XRAY_TEST_PLAN_KEY="$(echo "${XRAY_TEST_PLAN_KEY:-}" | tr -d '\r\n' | xargs)"
          echo "Project key : $XRAY_PROJECT_KEY"
          echo "Test plan   : ${XRAY_TEST_PLAN_KEY:-(not set)}"

          # ── Authenticate (once) ───────────────────────────────────
          echo "Authenticating with Xray..."
          TOKEN=$(curl -sS \
            -H "Content-Type: application/json" \
            -X POST https://xray.cloud.getxray.app/api/v2/authenticate \
            -d "{\"client_id\":\"$XRAY_CLIENT_ID\",\"client_secret\":\"$XRAY_CLIENT_SECRET\"}" \
            | tr -d '"')

          if [ -z "$TOKEN" ]; then
            echo "ERROR: Xray authentication failed"
            exit 1
          fi
          echo "Authentication successful"

          # ── Build import URL ──────────────────────────────────────
          URL="https://xray.cloud.getxray.app/api/v2/import/execution/junit?projectKey=$XRAY_PROJECT_KEY"
          if [ -n "${XRAY_TEST_PLAN_KEY:-}" ]; then
            URL="${URL}&testPlanKey=$XRAY_TEST_PLAN_KEY"
          fi
          echo "Import URL: $URL"

          # ── Import helper with retry (max 3 attempts) ─────────────
          import_xml() {
            local xml_file="$1"
            local label="$2"
            local resp_file="reports/xray_response_${label}.json"

            if [ ! -f "$xml_file" ]; then
              echo "SKIP: $xml_file not found"
              return 0
            fi

            echo ""
            echo "=== Importing $xml_file ($(wc -c < "$xml_file") bytes) ==="

            local attempt=0
            local max_attempts=3
            local status=""

            while [ $attempt -lt $max_attempts ]; do
              attempt=$((attempt + 1))
              echo "  Attempt $attempt/$max_attempts..."

              status=$(curl -sS \
                --max-time 120 \
                -w "%{http_code}" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: text/xml" \
                --data-binary "@$xml_file" \
                "$URL" \
                -o "$resp_file" 2>/dev/null || echo "000")

              echo "  HTTP Status: $status"
              cat "$resp_file" 2>/dev/null || true

              if [ "$status" = "200" ]; then
                echo "  ✅ Import successful: $label"
                return 0
              fi

              if [ "$status" = "504" ] || [ "$status" = "502" ] || [ "$status" = "000" ]; then
                echo "  ⚠️  Transient error ($status), retrying in 10s..."
                sleep 10
              else
                echo "  ❌ Non-retryable error: HTTP $status"
                return 1
              fi
            done

            echo "  ❌ All $max_attempts attempts failed for $label"
            return 1
          }

          # ── Import each file separately (smaller payload) ─────────
          OVERALL=0

          import_xml "reports/junit_pp2vspp5.xml"              "pp2vspp5"              || OVERALL=1
          import_xml "reports/junit_pp2vspp5_changeid.xml"     "pp2vspp5_changeid"     || OVERALL=1
          import_xml "reports/junit_pp2vspp5_changeid_run.xml" "pp2vspp5_changeid_run" || OVERALL=1

          if [ "$OVERALL" != "0" ]; then
            echo ""
            echo "ERROR: One or more Xray imports failed"
            exit 1
          fi

          echo ""
          echo "All imports successful ✅"

      - name: Upload reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: search-api-reports
          path: reports
          if-no-files-found: warn
