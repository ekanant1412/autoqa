name: fix bug duplicate
on:
  workflow_dispatch:
jobs:
  search-api-test:
    runs-on: [self-hosted, macOS, preprod]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        run: |
          python3 --version
          python3 -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          set -e
          python3 -m pip install requests pytest

      - name: Show workspace
        run: |
          pwd
          ls -la
          mkdir -p reports

      - name: Run check_pp2vspp5.py
        run: |
          set -e
          python3 -m pytest tests/check_pp2vspp5.py \
            --junitxml=reports/junit_pp2vspp5.xml \
            -v -s

      - name: Run check_pp2vspp5_changeid.py
        run: |
          set -e
          python3 -m pytest check_pp2vspp5_changeid.py \
            --junitxml=reports/junit_pp2vspp5_changeid.xml \
            -v -s

      - name: Run check_pp2vspp5_changeid_run.py
        run: |
          set -e
          python3 -m pytest check_pp2vspp5_changeid_run.py \
            --junitxml=reports/junit_pp2vspp5_changeid_run.xml \
            -v -s

      - name: Merge JUnit XMLs
        if: always()
        run: |
          python3 - <<'EOF'
          import glob, xml.etree.ElementTree as ET

          out = ET.Element("testsuites")
          total = {"tests": 0, "failures": 0, "errors": 0, "skipped": 0}

          for path in sorted(glob.glob("reports/junit_*.xml")):
              root = ET.parse(path).getroot()
              suites = root.findall("testsuite") if root.tag == "testsuites" else [root]
              for ts in suites:
                  out.append(ts)
                  for k in total:
                      total[k] += int(ts.get(k, 0))

          out.set("tests",    str(total["tests"]))
          out.set("failures", str(total["failures"]))
          out.set("errors",   str(total["errors"]))
          out.set("skipped",  str(total["skipped"]))

          ET.ElementTree(out).write(
              "reports/junit.xml", encoding="utf-8", xml_declaration=True
          )
          print(f"Merged → reports/junit.xml  "
                f"tests={total['tests']} failures={total['failures']} "
                f"errors={total['errors']} skipped={total['skipped']}")
          EOF

      - name: Import JUnit to Xray
        if: always()
        env:
          XRAY_CLIENT_ID: ${{ secrets.XRAY_CLIENT_ID }}
          XRAY_CLIENT_SECRET: ${{ secrets.XRAY_CLIENT_SECRET }}
          XRAY_PROJECT_KEY: ${{ secrets.XRAY_PROJECT_KEY }}
          XRAY_TEST_PLAN_KEY: ${{ secrets.XRAY_TEST_PLAN_KEY }}
        run: |
          set -euo pipefail
          if [ ! -f reports/junit.xml ]; then
            echo "ERROR: reports/junit.xml not found"
            ls -la reports || true
            exit 1
          fi
          echo "=== junit.xml preview (first 30 lines) ==="
          head -30 reports/junit.xml || true
          if [ -z "${XRAY_CLIENT_ID:-}" ] || [ -z "${XRAY_CLIENT_SECRET:-}" ] || [ -z "${XRAY_PROJECT_KEY:-}" ]; then
            echo "ERROR: Missing required XRAY secrets"
            exit 1
          fi
          XRAY_PROJECT_KEY="$(echo "$XRAY_PROJECT_KEY" | tr -d '\r\n' | xargs)"
          XRAY_TEST_PLAN_KEY="$(echo "${XRAY_TEST_PLAN_KEY:-}" | tr -d '\r\n' | xargs)"
          echo "Project key : $XRAY_PROJECT_KEY"
          echo "Test plan   : ${XRAY_TEST_PLAN_KEY:-(not set)}"
          echo "Authenticating with Xray..."
          TOKEN=$(curl -sS \
            -H "Content-Type: application/json" \
            -X POST https://xray.cloud.getxray.app/api/v2/authenticate \
            -d "{\"client_id\":\"$XRAY_CLIENT_ID\",\"client_secret\":\"$XRAY_CLIENT_SECRET\"}" \
            | tr -d '"')
          if [ -z "$TOKEN" ]; then
            echo "ERROR: Xray authentication failed"
            exit 1
          fi
          echo "Authentication successful"
          URL="https://xray.cloud.getxray.app/api/v2/import/execution/junit?projectKey=$XRAY_PROJECT_KEY"
          if [ -n "$XRAY_TEST_PLAN_KEY" ]; then
            URL="${URL}&testPlanKey=$XRAY_TEST_PLAN_KEY"
          fi
          echo "Import URL: $URL"
          HTTP_STATUS=$(curl -sS \
            -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: text/xml" \
            --data-binary @reports/junit.xml \
            "$URL" \
            -o reports/xray_import_response.json)
          echo "HTTP Status : $HTTP_STATUS"
          cat reports/xray_import_response.json || true
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: Xray import failed with HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Import successful"

      - name: Upload reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: search-api-reports
          path: reports
          if-no-files-found: warn
