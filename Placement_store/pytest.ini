[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Default browser: chromium (can override with --browser=firefox or --browser=webkit)
# Default: headless. Add --headed to watch the browser.
addopts =
    -v
    --tb=short
    --html=reports/report.html
    --self-contained-html

markers =
    smoke: Smoke tests (quick sanity check)
    regression: Full regression suite
    high: High priority test cases
    medium: Medium priority test cases
    low: Low priority test cases
