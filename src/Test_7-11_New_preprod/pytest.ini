[pytest]
# ─── รัน pytest ทุก test ทีเดียว ───────────────────────────────────────────
# คำสั่ง: pytest              (รันทุกไฟล์)
#         pytest test_all.py -v   (รันเฉพาะไฟล์ที่ชื่อมีอักขระพิเศษ)
#         pytest Verify_*.py -v   (รันเฉพาะ Verify files)

addopts = -v --tb=short --import-mode=importlib

testpaths = .

# ไฟล์ที่ pytest เก็บ test โดยตรง
# (ไฟล์ที่ชื่อมีช่องว่าง/วงเล็บ ให้ test_all.py จัดการแทน)
python_files =
    test_all.py
    Verify_*.py

python_classes = Test
python_functions = test_
